version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fitflow
      POSTGRES_USER: fitflow
      POSTGRES_PASSWORD: fitflow1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fitflow:fitflow1234@db:5432/fitflow
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app
    command: >
      sh -c "python -m app.seed_data && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
